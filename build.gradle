plugins {
  id 'java'
  id 'application'
}

defaultTasks 'build'

repositories {
  mavenCentral()

  flatDir {
    dirs 'lib'
  }
}

dependencies {
  implementation('org.ini4j:ini4j:0.5.4')
  implementation files('lib/maqit-simulator-1.0.jar')
}

tasks.named('run') {
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'fr.emse.BasicSimulator'
}

// Task to run warehouse simulation
tasks.register('warehouse', JavaExec) {
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'fr.emse.warehouse.WarehouseSimulator'
}

// Task to run reference model
tasks.register('reference', JavaExec) {
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'fr.emse.warehouse.WarehouseSimulator'
  args = ['reference']
}

// Task to run enhanced model
tasks.register('enhanced', JavaExec) {
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'fr.emse.warehouse.WarehouseSimulator'
  args = ['enhanced']
}